<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Estilo da página */
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f7fa;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container central */
        .container {
            text-align: center;
        }

        /* Botão Teste grátis */
        .btn {
            display: inline-block;
            background-color: #007bff;
            color: white;

            padding: 18px 40px;
            font-size: 1.3rem;
            font-weight: bold;

            border-radius: 12px;
            text-decoration: none;

            transition: 0.3s;
        }

        /* Hover */
        .btn:hover {
            background-color: #0069d9;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Título (opcional, mas melhora o trabalho) -->
        <h1>Bem-vindo</h1>

        <!-- Botão que leva para o cadastro -->
        <a href="teste-gratis.html" class="btn">
            Teste grátis
        </a>

    </div>

</body>
</html>
